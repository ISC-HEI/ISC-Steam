# nginx site for ISC Steam - proxies the domain to the Docker app on localhost.
#
# ⚠️  DO NOT `cp` THIS FILE OVER A LIVE, CERTBOT-MANAGED CONFIG.
#     Once certbot has added the HTTPS (listen 443 ssl) block to the deployed
#     file, overwriting it with this template WIPES the SSL block and resets the
#     domain, taking the site down. To change only the upload limit on a running
#     server, edit `client_max_body_size` in the live file directly, or set it
#     once in the http{} block of /etc/nginx/nginx.conf.
#
# First-time install only:
#   sudo cp deploy/nginx-iscsteam.conf /etc/nginx/sites-available/iscsteam
#   sudo ln -s /etc/nginx/sites-available/iscsteam /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d steamisc.triceratops.ch     # adds HTTPS (edits this file in place)
server {
    listen 80;
    listen [::]:80;
    server_name steamisc.triceratops.ch;

    # game package uploads (and future video previews) from the dashboard can be large.
    # Keep this >= the largest value in server/src/config/uploadLimits.js (gamePackage).
    client_max_body_size 1g;

    location / {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # game packages can be large; don't buffer uploads/downloads to disk
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # socket.io (friends / chat / presence) needs WebSocket upgrades
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }
}
